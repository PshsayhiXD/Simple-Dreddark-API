    <script type="text/babel">
const { useState, useEffect, useRef } = React;

const useLiveCodes = () => {
  const [isReady, setIsReady] = useState(false);

  useEffect(() => {
    if (window.livecodes) {
      setIsReady(true);
      return;
    }

    const checkInterval = setInterval(() => {
      if (window.livecodes) {
        setIsReady(true);
        clearInterval(checkInterval);
      }
    }, 100);

    const timeout = setTimeout(() => {
      clearInterval(checkInterval);
      console.error('LiveCodes failed to load');
    }, 10000);

    return () => {
      clearInterval(checkInterval);
      clearTimeout(timeout);
    };
  }, []);

  return isReady ? window.livecodes : null;
};
      const Icon = ({ name }) => <span className="material-icons">{name}</span>;

      const Badge = ({ type, children }) => (
        <span className={`badge badge-${type}`}>{children}</span>
      );

      const CopyButton = ({ text }) => {
        const [copied, setCopied] = useState(false);
        const handleCopy = () => {
          navigator.clipboard.writeText(text).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          });
        };
        return (
          <button className="copy-button" onClick={handleCopy}>
            <Icon name={copied ? "check" : "content_copy"} />
            {copied ? "Copied!" : "Copy"}
          </button>
        );
      };

      const CodeBlock = ({ children, language = "javascript" }) => {
        useEffect(() => {
          Prism.highlightAll();
        }, [children]);
        return (
          <div className="code-block-wrapper">
            <CopyButton text={children.trim()} />
            <pre>
              <code className={`language-${language}`}>{children.trim()}</code>
            </pre>
          </div>
        );
      };

      const FunctionDoc = ({ name, desc, code, async, deprecated, children }) => (
        <div className="function-bg">
          <div className="function-name">
            {name}
            {async && <Badge type="async">async</Badge>}
            {deprecated && <Badge type="deprecated">DEPRECATED</Badge>}
          </div>
          {desc && <div className="function-desc">{desc}</div>}
          {code && <CodeBlock>{code}</CodeBlock>}
          {children}
        </div>
      );

      const ParamTable = ({ params }) => (
        <table>
          <thead>
            <tr>
              <th>{params[0]?.isOption ? "Option" : params[0]?.isHandler ? "Handler Property" : "Parameter"}</th>
              <th>Type</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            {params.map((p, i) => (
              <tr key={i}>
                <td><code>{p.name}</code></td>
                <td>{p.type}</td>
                <td>{p.desc}</td>
              </tr>
            ))}
          </tbody>
        </table>
      );

      const EventTable = ({ events }) => (
        <table>
          <thead>
            <tr>
              <th>Event</th>
              <th>Payload</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            {events.map((e, i) => (
              <tr key={i}>
                <td><code>{e.name}</code></td>
                <td><code>{e.payload}</code></td>
                <td>{e.desc}</td>
              </tr>
            ))}
          </tbody>
        </table>
      );

      const InfoBox = ({ children }) => (
        <div className="info">
          <Icon name="info" />
          {children}
        </div>
      );

      const WarningBox = ({ children }) => (
        <div className="warning">
          <Icon name="warning" />
          {children}
        </div>
      );

const Playground = ({ initialCode, scope = {} }) => {
  const livecodes = useLiveCodes();
  const containerRef = useRef(null);
  const playgroundRef = useRef(null);
  const [apiReady, setApiReady] = useState(false);
  const [apiCode, setApiCode] = useState('');

  useEffect(() => {
    if (window.Dreddark) {
      setApiReady(true);
      fetch("https://raw.githubusercontent.com/PshsayhiXD/Simple-Dreddark-API/master/stable.min.js")
        .then(r => r.text())
        .then(code => setApiCode(code))
        .catch(err => console.error("Failed to fetch API code:", err));
      return;
    }

    const handler = () => {
      setApiReady(true);
      fetch("https://raw.githubusercontent.com/PshsayhiXD/Simple-Dreddark-API/master/stable.min.js")
        .then(r => r.text())
        .then(code => setApiCode(code))
        .catch(err => console.error("Failed to fetch API code:", err));
    };
    window.addEventListener("dreddark-api-ready", handler);

    return () => window.removeEventListener("dreddark-api-ready", handler);
  }, []);

  useEffect(() => {
    if (!livecodes || !containerRef.current || playgroundRef.current || !apiReady || !apiCode) return;

    const initPlayground = async () => {
      try {
        const playground = await livecodes.createPlayground(containerRef.current, {
          config: {
            markup: {
              language: 'html',
              content: `<div id="output"></div>`
            },
            style: {
              language: 'css',
              content: 'body { font-family: monospace; padding: 10px; }'
            },
            script: {
              language: 'javascript',
              content: `// Dreddark API loaded
${apiCode}

// User code
${initialCode || ''}
`
            },
            tools: {
              enabled: ['console'],
              active: 'console',
              status: 'open'
            }
          },
          loading: 'eager'
        });
        playgroundRef.current = playground;
      } catch (error) {
        console.error('Failed to create LiveCodes playground:', error);
      }
    };

    initPlayground();

    return () => {
      if (playgroundRef.current && playgroundRef.current.destroy) {
        playgroundRef.current.destroy();
      }
    };
  }, [livecodes, initialCode, apiReady, apiCode]);

  if (!livecodes || !apiReady || !apiCode) {
    return <div style={{ padding: '20px', textAlign: 'center' }}>
      Loading playground{!apiReady ? ' (waiting for Dreddark API)' : !apiCode ? ' (loading API code)' : ''}...
    </div>;
  }

  return (
    <div 
      ref={containerRef} 
      className="playground"
      style={{ height: '400px', width: '100%', minHeight: '400px' }}
    />
  );
};

      const SearchBar = ({ onSearch }) => {

      const ThemeToggle = () => {
        const [dark, setDark] = useState(false);
        useEffect(() => {
          if (dark) document.body.classList.add('dark');
          else document.body.classList.remove('dark');
        }, [dark]);
        return (
          <div className="theme-toggle">
            <span>Dark Mode</span>
            <button onClick={() => setDark(!dark)}>
              <Icon name={dark ? "light_mode" : "dark_mode"} />
              {dark ? "Light" : "Dark"}
            </button>
          </div>
        );
      };

      const App = () => {
        const navItems = [
          { id: "start", icon: "play_arrow", label: "Getting Started" },
          { id: "debug", icon: "bug_report", label: "Debug" },
          { id: "events", icon: "event", label: "Events" },
          { id: "chat", icon: "chat", label: "Chat" },
          { id: "ship", icon: "directions_boat", label: "Ship" },
          { id: "client", icon: "person", label: "Client" },
          { id: "commands", icon: "terminal", label: "Commands" },
          { id: "mission", icon: "assignment", label: "Mission" },
          { id: "pvp", icon: "sports_mma", label: "PvP" },
          { id: "storage", icon: "storage", label: "Storage" },
          { id: "utils", icon: "build", label: "Utils" },
          { id: "dom", icon: "code", label: "DOM" },
          { id: "outfit", icon: "checkroom", label: "Outfit (Deprecated)" },
        ];

        const [activeSection, setActiveSection] = useState("start");
        const [searchQuery, setSearchQuery] = useState('');
        const [fuse, setFuse] = useState(null);

        useEffect(() => {
          const sections = Array.from(document.querySelectorAll('.section'));
          const sectionData = sections.map(section => ({
            id: section.id,
            title: section.querySelector('h2')?.textContent || '',
            content: section.textContent || ''
          }));
          const fuseInstance = new Fuse(sectionData, {
            keys: ['title', 'content'],
            threshold: 0.4,
            includeScore: true,
          });
          setFuse(fuseInstance);
        }, []);

        useEffect(() => {
          const sections = document.querySelectorAll('.section');
          if (!fuse || searchQuery.trim() === '') {
            sections.forEach(section => section.classList.remove('hidden'));
            return;
          }
          const results = fuse.search(searchQuery);
          const matchingIds = new Set(results.map(r => r.item.id));
          sections.forEach(section => {
            if (matchingIds.has(section.id)) {
              section.classList.remove('hidden');
            } else {
              section.classList.add('hidden');
            }
          });
        }, [searchQuery, fuse]);

        const scrollToSection = (id) => {
          const element = document.getElementById(id);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setActiveSection(id);
          }
        };

        useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  setActiveSection(entry.target.id);
                }
              });
            },
            { threshold: 0.1, rootMargin: '-100px 0px -60% 0px' }
          );
          document.querySelectorAll('.section[id]').forEach((section) => {
            observer.observe(section);
          });
          return () => observer.disconnect();
        }, []);

        useEffect(() => {
          const sectionLabel = navItems.find(i => i.id === activeSection)?.label || 'Documentation';
          document.title = `Dreddark API - ${sectionLabel}`;
        }, [activeSection, navItems]);

                if (!validItems.includes(value)) {
                    return "Invalid item. Use: sword or shield";

                return null;
            }
        }

                  <FunctionDoc
                    name="Dreddark.pvpEvent.pvpEvent(eventQuery: string)"

                    async

                    <ParamTable
                      params={[
                        { name: "eventQuery", type: "String", desc: "A query string — use pvpEventQuery helpers or pass a date string directly." },
                      ]}

                    <CodeBlock>{`const { pvpEvent, pvpEventQuery } = Dreddark.pvpEvent;
 
// Using pvpEventQuery helpers
const all         = await pvpEvent(pvpEventQuery.all());
const today       = await pvpEvent(pvpEventQuery.today());
const next        = await pvpEvent(pvpEventQuery.next());
const second      = await pvpEvent(pvpEventQuery.second());
const third       = await pvpEvent(pvpEventQuery.third());
const fourth      = await pvpEvent(pvpEventQuery.fourth());
 
// Query by weekday
const fridays     = await pvpEvent(pvpEventQuery.friday());
const mondays     = await pvpEvent(pvpEventQuery.monday());
 
// Query by any Date or timestamp
const byDate      = await pvpEvent(pvpEventQuery.day(new Date()));
const byTimestamp = await pvpEvent(pvpEventQuery.day(Date.now()));
 
// Query by raw date string
const byRaw       = await pvpEvent("2026-03-21");`}</CodeBlock>
